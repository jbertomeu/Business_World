# Mock smoke that uses the biotech_early_stage scenario.
# Verifies scenario → initialize_world → IPO end-to-end in one command.

n_firms_initial: 5
n_quarters: 6
seed: 42
scenario: biotech_early_stage

default_llm:
  backend: mock
  model: mock

# Stage 10/11/12 on to exercise everything downstream
restructuring_enabled: true
env_decision_overrides_enabled: true
stock_comp_enabled: true
governance_enabled: true
legal_reserves_enabled: true
pension_enabled: true
deferred_taxes_enabled: true
activist_investors_enabled: true
