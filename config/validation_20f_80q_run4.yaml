# Wave ν+12 run-4: 80Q with all Wave ν+12 changes:
#   - Reverted prescriptive shake-out language (env now allocates honestly,
#     does not drive shake-out)
#   - Removed numerical hierarchy from env's Gen-2 directive (qualitative)
#   - Reframed entry judge around POTENTIAL (TAM share captured, etc.)
#   - Lifted firm cap from 20 → 40 (n_firms_max independent of initial cohort)
#   - investor_voice_enabled: per-firm market analyst note each quarter
#   - M&A bidder neutralised: no default-NO, distinguishes fresh entrants
#     from sub-scale incumbents; real revenue + tenure passed
#   - Cash-allocation reflection now has M&A as fourth explicit option
#   - Defaulted firms included in BS-baseline (no more phantom phase_2_ipo spam)
#
# Independent seed (7777 was run-3; using 5555 here).

n_firms_initial: 8           # smaller initial cohort — leave room for entry
n_firms_max: 40              # generous cap; entry judge throttles below this
n_quarters: 80
seed: 5555

scenario: well_capitalized

