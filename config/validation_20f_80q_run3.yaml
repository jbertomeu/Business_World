# Wave ν+11 run-3: 20-firm × 80Q with all Wave ν+11 fixes (E1–E9 + B1–B7)
#
# Differences vs validation_20f_80q_seed9999.yaml:
#   - seed 7777 (independent draw from run-2's 9999)
#   - env_validator_enabled: true (E9, the only Wave ν+11 fix not unconditional code)
#
# Validates run-3 questions:
#   - Does the industry now grow into the $2T TAM (E4 capacity-PPE coupling)?
#   - Do firms return capital instead of always HOLD-for-optionality (E2)?
#   - Do generation transitions actually fire on firms past 3× threshold (B7/§5.4)?
#   - Do activists escalate via proxy_fight (E7)?
#   - Does the M&A regulator ever block a friendly merger (E8)?
#   - Does the IB decline death-spiral raises (E3)?

