# Waves ι + κ + λ integrated validation run
# Full private→public lifecycle: firms start with seed capital, raise PE
# rounds, decide when to IPO. Strategic planning on. Scenario-driven
# economics with longevity-breakthrough industry character.
#
# Expected dynamics:
#   - Q1: 3 firms start "founded" with ~$40M seed each
#   - Q1-Q2: firms pitch Series A; PE funds evaluate + lead rounds
#   - Q4-Q8: Series B/C as firms approach commercial launch
#   - Q16-Q24: first IPOs if firms reach late_stage_private
#   - Strategic plans reissued every 4Q; variance triggers re-plan
#
# Estimated: ~3-4 hours wall-clock, ~$0.60-1.00 USD

n_firms_initial: 3
n_quarters: 8
seed: 42

scenario: well_capitalized

default_llm:
  backend: openrouter
  model: mistralai/mistral-small-24b-instruct-2501

agents:
  firm_0:
    model: "mistralai/mistral-small-24b-instruct-2501"
    backend: openrouter
    temperature: 0.30
  firm_1:
    model: "qwen/qwen3-235b-a22b-2507"
    backend: openrouter
    temperature: 0.35
  firm_2:
    model: "google/gemini-2.0-flash-001"
    backend: openrouter
    temperature: 0.40

# Core expansion
earnings_management_enabled: true
sec_enabled: true
sellside_analysts_enabled: true
earnings_announcement_enabled: true
auditor_enabled: true
governance_enabled: true
restatements_enabled: true
macro_expansion_enabled: true
ma_enabled: true

data_broker_enabled: true
data_broker_mode: combo
data_broker_max_queries_per_agent_per_quarter: 2

debt_covenants_enabled: true
convertible_debt_enabled: true
working_capital_decisions: true
bad_debt_enabled: true

annual_reports_enabled: true
env_verification_enabled: true

restructuring_enabled: true
env_decision_overrides_enabled: true

stock_comp_enabled: true

legal_reserves_enabled: true
pension_enabled: true
deferred_taxes_enabled: true
activist_investors_enabled: true

# Wave θ richness
noisy_signals_enabled: true
noisy_signals_sd: 0.15
directors_enabled: true
director_lifecycle_enabled: true
three_llm_board_enabled: true
cost_telemetry_enabled: true

# Wave κ — strategic planning
strategic_planning_enabled: true

# Wave λ — PE + IPO lifecycle (the major test of this run)
pe_lifecycle_enabled: true

snapshots_enabled: true
parallel_firm_decisions: true
