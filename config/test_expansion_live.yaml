# Live test: expansion features with OpenRouter-only firms
# Usage: python -m src run --config config/test_expansion_live.yaml

n_firms_initial: 3
n_quarters: 4
seed: 42

default_llm:
  backend: openrouter
  model: deepseek/deepseek-v3.2

# Override firms to use OpenRouter (skip horde for testing — too slow for long prompts)
agents:
  firm_0:
    model: "mistralai/mistral-small-24b-instruct-2501"
    backend: openrouter
    temperature: 0.30
  firm_1:
    model: "qwen/qwen3-235b-a22b-2507"
    backend: openrouter
    temperature: 0.35
  firm_2:
    model: "z-ai/glm-4-32b"
    backend: openrouter
    temperature: 0.40

# Expansion toggles
earnings_management_enabled: true
sec_enabled: true
sellside_analysts_enabled: true
earnings_announcement_enabled: true
auditor_enabled: true
governance_enabled: true
