# Resume of run-8 from Q74 snapshot.
#
# Run-8 hit Q74 cleanly in 54h, then completeness gate halted at Q75
# because firm_18 had no equity price update. Investigation showed the
# equity panel had emitted absurd prices (firm_18: $60 → $60,000 between
# Q72 and Q73, a 1000× spike) — completeness gate only checks PRESENCE
# not VALUE, so Q73 and Q74 passed despite the corruption.
#
# Wave ν+14l adds a mild deterministic equity-price sanity guard in the
# orchestrator's Phase 11: >20× single-Q change clamps to 5× move (still
# allows big legitimate catalysts; rejects obvious LLM errors).
#
# This resume config picks up from Q74 to finish the last 6 quarters
# (Q75-Q80) with the sanity guard active.

n_firms_initial: 6
n_firms_max: 20
n_quarters: 6                # 80 - 74 = 6 more quarters to reach Q80
seed: 8888

scenario: well_capitalized

default_llm:
  backend: openrouter
  model: meta-llama/llama-3.3-70b-instruct

