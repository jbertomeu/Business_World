# Wave ν+14 run-7: 80Q with three run-6 review fixes.
#
# Fixes vs run-6 (Wave ν+13):
#   1. Equity panel: explicit scale-sanity check + earnings-based floor
#      for mature firms. Fixes run-6 bug where firm_1 had $413B cash +
#      $43B/Q revenue but the panel priced it at $502M (P/E of 0.005).
#   2. PE evaluator: new "BUT — REAL PE FUNDS ALSO MAKE SEED BETS ON
#      NEW FIRMS" guidance softens walk-away for fresh entrants with no
#      prior PE history. Fixes run-6's 16-of-20-dormant outcome.
#   3. Dormant cleanup: firms dormant >12Q (3 years) are wound down
#      as INACTIVE — prevents perpetual-dormant clutter.
#
# Retains all Wave ν+13 changes (strict mandatory-Gen rules in env,
# deterministic force-grant, LLM swaps to llama-3.3-70b + gemini-flash-1.5).
#
# Known open bug not fixed here: firm_0 phantom equity destruction
# (treasury_stock grows in $200M increments while APIC sometimes wipes
# to zero). Investigated, not root-caused. Deferred to Wave ν+15.
#
# Independent seed 4444.

n_firms_initial: 6           # smaller initial cohort — leave room for entry
n_firms_max: 20              # 20-firm cap per user direction
n_quarters: 80
seed: 4444

scenario: well_capitalized

default_llm:
  backend: openrouter
  model: meta-llama/llama-3.3-70b-instruct   # swap from mistral-small (rate-limited)

agents:
  firm_0:  { model: "meta-llama/llama-3.3-70b-instruct", backend: openrouter, temperature: 0.30 }
  firm_1:  { model: "qwen/qwen3-235b-a22b-2507",                backend: openrouter, temperature: 0.35 }
  firm_2:  { model: "openai/gpt-4o-mini",              backend: openrouter, temperature: 0.40 }
  firm_3:  { model: "z-ai/glm-4-32b",                           backend: openrouter, temperature: 0.45 }
  firm_4:  { model: "google/gemma-3-12b-it",                    backend: openrouter, temperature: 0.50 }
  firm_5:  { model: "meta-llama/llama-3.3-70b-instruct", backend: openrouter, temperature: 0.32 }
  firm_6:  { model: "qwen/qwen3-235b-a22b-2507",                backend: openrouter, temperature: 0.38 }
  firm_7:  { model: "openai/gpt-4o-mini",              backend: openrouter, temperature: 0.42 }
  firm_8:  { model: "z-ai/glm-4-32b",                           backend: openrouter, temperature: 0.47 }
  firm_9:  { model: "google/gemma-3-12b-it",                    backend: openrouter, temperature: 0.52 }
  firm_10: { model: "meta-llama/llama-3.3-70b-instruct", backend: openrouter, temperature: 0.28 }
  firm_11: { model: "qwen/qwen3-235b-a22b-2507",                backend: openrouter, temperature: 0.33 }
  firm_12: { model: "openai/gpt-4o-mini",              backend: openrouter, temperature: 0.38 }
  firm_13: { model: "z-ai/glm-4-32b",                           backend: openrouter, temperature: 0.43 }
  firm_14: { model: "google/gemma-3-12b-it",                    backend: openrouter, temperature: 0.48 }
  firm_15: { model: "meta-llama/llama-3.3-70b-instruct", backend: openrouter, temperature: 0.30 }
  firm_16: { model: "qwen/qwen3-235b-a22b-2507",                backend: openrouter, temperature: 0.36 }
  firm_17: { model: "openai/gpt-4o-mini",              backend: openrouter, temperature: 0.41 }
  firm_18: { model: "z-ai/glm-4-32b",                           backend: openrouter, temperature: 0.46 }
  firm_19: { model: "google/gemma-3-12b-it",                    backend: openrouter, temperature: 0.51 }

# All expansion + theta + iota + kappa + lambda + nu features ON
earnings_management_enabled: true
sec_enabled: true
sellside_analysts_enabled: true
earnings_announcement_enabled: true
auditor_enabled: true
governance_enabled: true
restatements_enabled: true
macro_expansion_enabled: true
ma_enabled: true

data_broker_enabled: true
data_broker_mode: combo
data_broker_max_queries_per_agent_per_quarter: 2

debt_covenants_enabled: true
convertible_debt_enabled: true
working_capital_decisions: true
bad_debt_enabled: true

annual_reports_enabled: true
env_verification_enabled: true
env_validator_enabled: true       # Wave ν+11 E9 — second-env validator each Q
investor_voice_enabled: true      # Wave ν+12 — per-firm market commentary

# Wave ν+12 step 3 — per-quarter debrief notes (firm + env + intermediaries).
# Adds ~(N_firms + 7) cheap LLM calls per quarter. Toggle OFF if cost matters.
debriefs_enabled: true
# Wave ν+12 step 3 — cross-run LT memory file. OFF per user direction.
lt_memory_enabled: false

restructuring_enabled: true
env_decision_overrides_enabled: true

stock_comp_enabled: true

legal_reserves_enabled: true
pension_enabled: true
deferred_taxes_enabled: true
activist_investors_enabled: true

noisy_signals_enabled: true
